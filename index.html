<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Control de producción | Piezas por Área</title>

  <style>
    :root{
      --bg:#0b0c0f;
      --line: rgba(255,255,255,.14);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --accent: rgba(193, 18, 31, .95);
      --accentSoft: rgba(193, 18, 31, .18);
      --accentSoft2: rgba(193, 18, 31, .10);
      --radius:18px;
      --shadow: 0 16px 50px rgba(0,0,0,.55);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:
        radial-gradient(1200px 700px at 20% -10%, rgba(193,18,31,.16), transparent 60%),
        radial-gradient(1000px 600px at 90% 0%, rgba(255,255,255,.06), transparent 55%),
        var(--bg);
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    header{
      position:sticky; top:0; z-index:10;
      padding:18px 16px;
      border-bottom:1px solid rgba(193, 18, 31, .28);
      background:linear-gradient(180deg, rgba(11,12,15,.98), rgba(11,12,15,.86));
      backdrop-filter: blur(10px);
    }
    .wrap{max-width:1300px; margin:0 auto; padding:0 16px;}
    .titleRow{display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap}
    h1{margin:0; font-size:18px; letter-spacing:.2px}
    .sub{color:var(--muted); font-size:12px}
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(193, 18, 31, .35);
      background: var(--accentSoft2);
      color:rgba(255,255,255,.82);
      font-size:12px;
      font-family: var(--mono);
      user-select:none;
    }
    .dot{
      width:8px; height:8px; border-radius:99px;
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--accentSoft);
    }

    main{padding:18px 0 28px}
    .grid{display:grid; grid-template-columns: repeat(12, 1fr); gap:14px}
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.14);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:14px;
    }
    .card h3{
      margin:0 0 10px;
      font-size:12px;
      color: rgba(255,255,255,.70);
      font-weight:900;
      letter-spacing:.4px;
      text-transform: uppercase;
      position:relative;
      padding-left:12px;
    }
    .card h3:before{
      content:"";
      position:absolute;
      left:0;
      top:50%;
      transform:translateY(-50%);
      width:6px;
      height:12px;
      border-radius:3px;
      background: var(--accent);
      opacity:.95;
    }
    .span12{grid-column: span 12}
    .span7{grid-column: span 7}
    .span5{grid-column: span 5}
    @media (max-width: 980px){
      .span7,.span5{grid-column: span 12}
    }

    .controls{display:flex; gap:12px; flex-wrap:wrap; align-items:end;}
    .field{
      min-width: 230px;
      display:flex; flex-direction:column; gap:6px;
      padding:12px 12px;
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.16);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow: 0 12px 28px rgba(0,0,0,.35);
    }
    .field label{font-size:12px; color:var(--muted); font-weight:900}

    input[type="date"], input[type="text"], select{
      width:100%;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.18);
      padding:10px 12px;
      color: var(--text);
      outline:none;
    }

    input[type="date"]:focus, input[type="text"]:focus, select:focus{
      border-color: rgba(193, 18, 31, .70);
      box-shadow: 0 0 0 3px rgba(193, 18, 31, .18);
    }
    input[type="date"]::-webkit-calendar-picker-indicator{
      filter: invert(1);
      opacity: .9;
      cursor: pointer;
    }
    select{
      appearance:none; -webkit-appearance:none; -moz-appearance:none;
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(255,255,255,.85) 50%),
        linear-gradient(135deg, rgba(255,255,255,.85) 50%, transparent 50%);
      background-position:
        calc(100% - 18px) calc(50% - 4px),
        calc(100% - 12px) calc(50% - 4px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 34px;
    }
    option{background:#0b0c0f; color:#fff;}

    .status{
      padding:12px 12px;
      border-radius: 16px;
      border:1px dashed rgba(255,255,255,.18);
      background: rgba(255,255,255,.03);
    }
    .status b{font-weight:1000}
    .mono{font-family:var(--mono)}
    .tiny{font-size:11px; color:rgba(255,255,255,.55); text-align:center}

    .andonGrid{display:grid; grid-template-columns: repeat(4, 1fr); gap:12px}
    @media (max-width: 1000px){ .andonGrid{grid-template-columns: repeat(2, 1fr)} }
    @media (max-width: 560px){ .andonGrid{grid-template-columns: 1fr} }
    .tile{
      padding:14px;
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    }
    .tile .a{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      font-size:13px; color: rgba(255,255,255,.72); font-weight:1000
    }
    .tile .a .tag{
      font-size:11px;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.70);
      max-width: 62%;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tile .n{font-size:36px; font-weight:1100; margin-top:6px; letter-spacing:.3px; text-align:center}
    .tile .b{font-size:12px; color: rgba(255,255,255,.62); margin-top:6px; text-align:center}

    .tile{ position:relative; }
    .tile:hover{
      border-color: rgba(193, 18, 31, .45);
      box-shadow: 0 16px 50px rgba(0,0,0,.55), 0 0 0 1px rgba(193, 18, 31, .10) inset;
    }


    table{
      width:100%;
      border-collapse: separate;
      border-spacing: 0;
      overflow:hidden;
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.12);
    }
    thead th{
      position:sticky; top:0; z-index:2;
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(8px);
      text-align:left;
      font-size:12px;
      color: rgba(255,255,255,.70);
      padding:12px 10px;
      border-bottom:1px solid rgba(255,255,255,.12);
      font-weight:1000;
    }
    tbody td{
      padding:10px;
      font-size:13px;
      border-bottom:1px solid rgba(255,255,255,.10);
      color: rgba(255,255,255,.86);
      vertical-align:top;
    }
    tbody tr:hover td{background: rgba(255,255,255,.03)}
    td.num{text-align:right; font-family:var(--mono)}
  </style>
</head>

<body>
<header>
  <div class="wrap">
    <div class="titleRow">
      <div>
        <h1>Control de producción</h1>
        <div class="sub">Turno 07:00–16:45 · Extra 16:45–18:45 · Pintura especial 19:00–06:59</div>
      </div>
      <div class="pill"><span class="dot"></span><span id="lastUpdate">--</span></div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="grid">

      <div class="card span7">
        <h3>Filtros</h3>
        <div class="controls">
          <div class="field">
            <label>Día</label>
            <input type="date" id="dDay" />
          </div>

          <div class="field" style="min-width:260px;">
            <label>Área</label>
            <select id="fArea">
              <option value="">Todas</option>
            </select>
          </div>

          <div class="field" style="flex:1; min-width:320px;">
            <label>Buscar</label>
            <input id="q" type="text" placeholder="Pedido, descripción, folio, medida, operador, atado..." />
          </div>
        </div>
      </div>

      <div class="card span5">
        <h3>Estado</h3>
        <div class="status">
          <div><b id="statusText">Cargando datos…</b></div>
          <div class="sub" id="statusHint"></div>
          <div class="tiny" style="margin-top:10px;">
            Filas en Sheet: <span class="mono" id="rawRows">0</span> · Filtrado: <span class="mono" id="fRows">0</span>
          </div>
        </div>
      </div>

      <div class="card span12">
        <h3>Piezas por área</h3>
        <div class="andonGrid" id="andonGrid"></div>
      </div>

      <div class="card span12">
        <h3>Detalle</h3>
        <table>
          <thead>
            <tr>
              <th>Fecha/Hora</th>
              <th>Área</th>
              <th>Pedido</th>
              <th>Folio</th>
              <th>Descripción</th>
              <th>Medida</th>
              <th class="num">Cantidad</th>
              <th>Atado</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

    </div>
  </div>
</main>

<script>
  // Config fija
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/1zj1Faxj2qt_yDojIhhsGAag6t8TIBGqRrKimqCm_u9M/edit?gid=0#gid=0";
  const GID = 0;
  const REFRESH_MS = 30000;

  // Headers exactos
  const H = {
    ts: "Time Stamp",
    areaSigla: "Area (Sigla)",
    areaTexto: "Area completo (texto QR)",
    operador: "Operador",
    pedido: "Pedido",
    descripcion: "Descripcion",
    medida: "Medida",
    partnumber: "Partnumber",
    atadoActual: "Atado Actual",
    qty: "Cantidad"
  };

  // UI
  const dDay = document.getElementById("dDay");
  const fArea = document.getElementById("fArea");
  const q = document.getElementById("q");
  const statusText = document.getElementById("statusText");
  const statusHint = document.getElementById("statusHint");
  const lastUpdate = document.getElementById("lastUpdate");
  const rawRows = document.getElementById("rawRows");
  const fRows = document.getElementById("fRows");
  const andonGrid = document.getElementById("andonGrid");
  const tbody = document.getElementById("tbody");

  let raw = [];
  let filtered = [];

  function setStatus(msg, hint=""){ statusText.textContent = msg; statusHint.textContent = hint; }
  function normalize(s){ return String(s ?? "").trim().toLowerCase(); }
  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }
  function extractSheetId(url){
    const s = String(url || "").trim();
    const m = s.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
    return m ? m[1] : "";
  }
  function numFromAny(v){
    const s = String(v ?? "").trim();
    if (!s) return NaN;
    const cleaned = s.replace(/[^0-9.\-]/g, "");
    const n = Number(cleaned);
    return Number.isFinite(n) ? n : NaN;
  }
  function gvizDateToDate(v){
    if (v instanceof Date && !isNaN(v)) return v;
    const s = String(v ?? "").trim();
    const m = s.match(/^Date\((\d{4}),(\d{1,2}),(\d{1,2})(?:,(\d{1,2}),(\d{1,2}),(\d{1,2}))?\)/);
    if (!m) {
      const d = new Date(s);
      return isNaN(d) ? null : d;
    }
    const y = +m[1], mo = +m[2], da = +m[3];
    const hh = +(m[4] ?? 0), mm = +(m[5] ?? 0), ss = +(m[6] ?? 0);
    return new Date(y, mo, da, hh, mm, ss);
  }
  function fmtDateTime(dt){
    if (!(dt instanceof Date) || isNaN(dt)) return "";
    return dt.toLocaleString();
  }
  function piezasDeCantidad(r){
    const n = numFromAny(r.qty);
    return Number.isFinite(n) ? n : 0;
  }

  // JSONP
  function gvizJsonp(url){
    return new Promise((resolve, reject) => {
      const cb = "cb_" + Math.random().toString(36).slice(2);
      const script = document.createElement("script");
      const t = setTimeout(() => { cleanup(); reject(new Error("Timeout GViz")); }, 15000);

      function cleanup(){
        clearTimeout(t);
        script.remove();
        try { delete window[cb]; } catch(e){}
      }

      window[cb] = (resp) => { cleanup(); resolve(resp); };
      script.onerror = () => { cleanup(); reject(new Error("No se pudo cargar GViz")); };

      script.src = url + (url.includes("?") ? "&" : "?") + "tqx=responseHandler:" + cb;
      document.body.appendChild(script);
    });
  }

  function rebuildAreaFilter(rows){
    const areas = [...new Set(rows.map(r => r.areaSigla).filter(Boolean))]
      .sort((a,b)=>a.localeCompare(b,"es",{sensitivity:"base"}));
    const cur = fArea.value;
    fArea.innerHTML = `<option value="">Todas</option>` + areas.map(a => `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join("");
    fArea.value = areas.includes(cur) ? cur : "";
  }

  // Ventanas de tiempo (por día seleccionado)
  function windowsForArea(baseDate, areaSigla){
    const d0 = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate(), 0,0,0);
    const d1 = new Date(d0.getTime() + 24*60*60*1000);

    // General
    const mainStart = new Date(d0.getFullYear(), d0.getMonth(), d0.getDate(), 7, 0, 0);
    const mainEnd   = new Date(d0.getFullYear(), d0.getMonth(), d0.getDate(), 16, 45, 0);
    const otStart   = new Date(d0.getFullYear(), d0.getMonth(), d0.getDate(), 16, 45, 0);
    const otEnd     = new Date(d0.getFullYear(), d0.getMonth(), d0.getDate(), 18, 45, 0);

    // Pintura especial
    const spStart   = new Date(d0.getFullYear(), d0.getMonth(), d0.getDate(), 19, 0, 0);
    const spEnd     = new Date(d1.getFullYear(), d1.getMonth(), d1.getDate(), 7, 0, 0);

    const isPintura = String(areaSigla || "").toLowerCase().includes("pint");
    const list = [
      { name:"Turno", start: mainStart, end: mainEnd },
      { name:"Extra", start: otStart, end: otEnd }
    ];
    if (isPintura){
      list.push({ name:"Especial", start: spStart, end: spEnd });
    }
    return { isPintura, list };
  }

  function inAnyWindow(dt, ws){
    for (const w of ws) if (dt >= w.start && dt <= w.end) return w.name;
    return "";
  }

  function apply(){
    if (!dDay.value){
      setStatus("Selecciona un día.", "");
      filtered = [];
      render();
      return;
    }

    const base = new Date(dDay.value + "T00:00:00");
    if (isNaN(base)){
      setStatus("Fecha inválida.", "");
      return;
    }

    const areaSel = fArea.value;
    const query = normalize(q.value);

    filtered = raw.filter(x => {
      if (!x.ts) return false;

      if (areaSel){
        if (x.areaSigla !== areaSel) return false;
        const ws = windowsForArea(base, x.areaSigla).list;
        if (!inAnyWindow(x.ts, ws)) return false;
      } else {
        // “Todas”: usa ventana general del día (turno + extra) para el detalle
        const ws = windowsForArea(base, "X").list; // sin especial
        if (!inAnyWindow(x.ts, ws)) return false;
      }

      if (query){
        const blob = `${x.pedido} ${x.partnumber} ${x.descripcion} ${x.medida} ${x.operador} ${x.atado}`.toLowerCase();
        if (!blob.includes(query)) return false;
      }
      return true;
    });

    render();
  }

  function render(){
    rawRows.textContent = String(raw.length);
    fRows.textContent = String(filtered.length);

    if (!dDay.value){
      andonGrid.innerHTML = "";
      tbody.innerHTML = "";
      return;
    }

    const base = new Date(dDay.value + "T00:00:00");

    // Tablero por área (siempre aplica ventanas por área, incluyendo especial Pintura)
    const byArea = new Map();

    for (const x of raw){
      if (!x.ts) continue;
      const area = x.areaSigla || "SIN ÁREA";
      const cfg = windowsForArea(base, area);
      const bucket = inAnyWindow(x.ts, cfg.list);
      if (!bucket) continue;

      let cur = byArea.get(area);
      if (!cur){
        cur = { area, areaTxt: x.areaTexto || "", total:0, turno:0, extra:0, especial:0, regs:0, last:null, isPintura: cfg.isPintura };
        byArea.set(area, cur);
      }

      cur.total += x.piezas;
      cur.regs += 1;
      if (bucket === "Turno") cur.turno += x.piezas;
      else if (bucket === "Extra") cur.extra += x.piezas;
      else if (bucket === "Especial") cur.especial += x.piezas;

      if (!cur.last || x.ts > cur.last) cur.last = x.ts;
    }

    const tiles = [...byArea.values()].sort((a,b)=> (b.total-a.total) || a.area.localeCompare(b.area,"es"));

    andonGrid.innerHTML = tiles.map(t => {
      const lastStr = t.last ? t.last.toLocaleString() : "-";
      const breakdown = t.isPintura
        ? `Turno: ${t.turno} · Extra: ${t.extra} · Especial: ${t.especial} · Regs: ${t.regs} · Último: ${lastStr}`
        : `Turno: ${t.turno} · Extra: ${t.extra} · Regs: ${t.regs} · Último: ${lastStr}`;

      return `
        <div class="tile">
          <div class="a">
            <span>${escapeHtml(t.area)}</span>
            <span class="tag" title="${escapeHtml(t.areaTxt)}">${escapeHtml(t.areaTxt || "—")}</span>
          </div>
          <div class="n">${escapeHtml(t.total)}</div>
          <div class="b">${escapeHtml(breakdown)}</div>
        </div>
      `;
    }).join("");

    // Tabla detalle (recientes primero)
    const sorted = filtered.slice().sort((a,b)=> (b.ts - a.ts));
    tbody.innerHTML = sorted.map(x => `
      <tr>
        <td>${escapeHtml(fmtDateTime(x.ts))}</td>
        <td>${escapeHtml(x.areaSigla)}</td>
        <td>${escapeHtml(x.pedido)}</td>
        <td>${escapeHtml(x.partnumber)}</td>
        <td>${escapeHtml(x.descripcion)}</td>
        <td>${escapeHtml(x.medida)}</td>
        <td class="num">${escapeHtml(x.piezas)}</td>
        <td>${escapeHtml(x.atado)}</td>
      </tr>
    `).join("");

    setStatus("OK", "");
  }

  async function fetchSheet(){
    const id = extractSheetId(SHEET_URL);
    const url = `https://docs.google.com/spreadsheets/d/${encodeURIComponent(id)}/gviz/tq?gid=${encodeURIComponent(GID)}&tq=${encodeURIComponent("select *")}`;

    try{
      const resp = await gvizJsonp(url);
      const table = resp && resp.table;
      if (!table || !table.cols || !table.rows) throw new Error("Respuesta GViz incompleta");

      const headers = table.cols.map(c => String(c.label || "").trim());
      const hmap = new Map(headers.map((h,i)=>[h,i]));

      const need = [H.ts, H.areaSigla, H.pedido, H.descripcion, H.partnumber, H.medida, H.qty];
      const missing = need.filter(x => !hmap.has(x));
      if (missing.length){
        setStatus("Headers no coinciden.", "Faltan: " + missing.join(", "));
        raw = [];
        apply();
        return;
      }

      const idx = Object.fromEntries(Object.entries(H).map(([k,v]) => [k, hmap.has(v) ? hmap.get(v) : -1]));

      const rows = table.rows
        .map(r => (r.c || []).map(cell => cell ? (cell.v ?? "") : ""))
        .filter(r => r.some(v => String(v).trim() !== ""));

      raw = rows.map(r => {
        const ts = gvizDateToDate(r[idx.ts]);
        const base = {
          ts,
          areaSigla: String(r[idx.areaSigla] ?? "").trim(),
          areaTexto: idx.areaTexto === -1 ? "" : String(r[idx.areaTexto] ?? "").trim(),
          operador: idx.operador === -1 ? "" : String(r[idx.operador] ?? "").trim(),
          pedido: String(r[idx.pedido] ?? "").trim(),
          descripcion: String(r[idx.descripcion] ?? "").trim(),
          medida: idx.medida === -1 ? "" : String(r[idx.medida] ?? "").trim(),
          partnumber: idx.partnumber === -1 ? "" : String(r[idx.partnumber] ?? "").trim(),
          atado: idx.atadoActual === -1 ? "" : String(r[idx.atadoActual] ?? "").trim(),
          qty: r[idx.qty]
        };
        return { ...base, piezas: piezasDeCantidad(base) };
      });

      rebuildAreaFilter(raw);

      if (!dDay.value){
        const t = new Date();
        const y = t.getFullYear();
        const m = String(t.getMonth()+1).padStart(2,"0");
        const d = String(t.getDate()).padStart(2,"0");
        dDay.value = `${y}-${m}-${d}`;
      }

      lastUpdate.textContent = new Date().toLocaleString();
      apply();
    }catch(err){
      console.error(err);
      setStatus("Error leyendo Sheet.", "");
    }
  }

  // Eventos
  dDay.onchange = apply;
  fArea.onchange = apply;
  q.oninput = apply;

  // Inicio
  fetchSheet();
  setInterval(fetchSheet, REFRESH_MS);
</script>

</body>
</html>
